---
layout: default
title: Home
---

<div class="row">
  <div class="column">
    <h2 class="mb-2">Made BY Fufufuono</h2>
  </div>
</div>

<h3>Recent Posts</h3>

{% for post in site.posts limit: 10 %}
<div class="row">
  <div class="three columns left lit">
    <p class="bottom">{{ post.date | date: "%b %-d, %Y" }}</p>
  </div>
  <div class="nine columns left mb-3">
    <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
  </div>
</div>
{% endfor %}

<h4><a href="{{ '/archives/' | relative_url }}">All Posts</a></h4>
