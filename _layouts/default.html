<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <meta name="author" content="{{ site.author | escape }}">
  <meta property="og:site_name" content="{{ site.title | escape }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preload" href="{{ '/fonts/dm-serif-display-v4-latin-regular.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/fonts/inter-v2-latin-regular.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ '/css/normalize.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/skeleton.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/custom.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/prism-dark.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/prism-line-numbers.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/user.css' | relative_url }}?v=20260606-2">
  <link rel="icon" type="image/png" href="{{ '/images/favicon.png' | relative_url }}?v=2">

  <style>
    a:not(.icon) {
      text-decoration-color: #0FA0CE;
      background-image: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 50%,
        #0FA0CE 50%
      );
    }
    blockquote {
      border-left: 8px solid #0FA0CE;
    }
    .nanobar .bar {
      background: #0FA0CE;
    }
    .button.button-primary:hover,
    button.button-primary:hover,
    input[type="submit"].button-primary:hover,
    input[type="reset"].button-primary:hover,
    input[type="button"].button-primary:hover,
    .button.button-primary:focus,
    button.button-primary:focus,
    input[type="submit"].button-primary:focus,
    input[type="reset"].button-primary:focus,
    input[type="button"].button-primary:focus {
      background-color: #0FA0CE;
      border-color: #0FA0CE;
    }
    input[type="email"]:focus,
    input[type="number"]:focus,
    input[type="search"]:focus,
    input[type="text"]:focus,
    input[type="tel"]:focus,
    input[type="url"]:focus,
    input[type="password"]:focus,
    textarea:focus,
    select:focus {
      border: 1px solid #0FA0CE;
    }
  </style>
  {% include analytics.html %}
</head>

<body>
  <div class="container">
    <div class="row">
      <div>
        <div class="row">
          <div class="two columns" style="max-width: 50px">
            <h1 class="mt-2 mode">
              <div onclick="setDarkMode(true)" id="darkBtn">🌑</div>
              <div onclick="setDarkMode(false)" id="lightBtn" class="hidden">☀️</div>
              <script>
                if (localStorage.getItem('preferredTheme') == 'dark') {
                  setDarkMode(true);
                }
                function setDarkMode(isDark) {
                  var darkBtn = document.getElementById('darkBtn');
                  var lightBtn = document.getElementById('lightBtn');
                  if (isDark) {
                    lightBtn.style.display = "block";
                    darkBtn.style.display = "none";
                    localStorage.setItem('preferredTheme', 'dark');
                  } else {
                    lightBtn.style.display = "none";
                    darkBtn.style.display = "block";
                    localStorage.removeItem('preferredTheme');
                  }
                  document.body.classList.toggle("darkmode", isDark);
                }
              </script>
            </h1>
          </div>

          <div class="six columns ml-1">
            <h1 class="mt-2">{{ site.title | escape }}.</h1>
          </div>

          <div class="twelve columns">
            <div class="row">
              <div class="nine columns left">
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/archives/' | relative_url }}" class="ml">Archives</a>
                <a href="{{ '/tags/' | relative_url }}" class="ml">Tags</a>
                <a href="{{ '/message/' | relative_url }}" class="ml">Message</a>
                {% if site.email %}
                  <a href="mailto:{{ site.email }}" target="_blank" class="ml">Email</a>
                {% endif %}
              </div>
            </div>
            <hr style="margin-bottom: 2.6rem">
          </div>
        </div>

        <div class="trans">
          {{ content }}

          <div class="row mt-2 site-footer">
            <div class="twelve columns">
              <p>&copy; {{ site.time | date: "%Y" }} {{ site.author | escape }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ '/js/nanobar.min.js' | relative_url }}"></script>
  <script>
    var options = {
      classname: 'nanobar',
      id: 'myNanobar'
    };
    var nanobar = new Nanobar(options);
    nanobar.go(30);
    nanobar.go(76);
    nanobar.go(100);
  </script>
</body>
</html>
